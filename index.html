<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0A2463" />

    <title>CNC Delivery | Pharmacy Delivery Service — Northeast Ohio</title>
    <meta name="description" content="Pharmacy and prescription delivery across 200+ ZIP codes in Northeast Ohio. Dispatched before midnight, delivered by 6 PM. Serving Akron, Canton, Medina, and surrounding communities since 2007." />
    <meta name="keywords" content="pharmacy delivery, prescription delivery, Northeast Ohio, Akron, Canton, Medina, cold chain delivery, medication delivery, courier service, HIPAA compliant delivery" />
    <meta name="author" content="CNC Delivery Service" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://cncdelivery.com" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://cncdelivery.com" />
    <meta property="og:title" content="CNC Delivery | Pharmacy Delivery — Northeast Ohio" />
    <meta property="og:description" content="Reliable prescription delivery across 200+ ZIP codes. Dispatched before midnight, in patients' hands by 6 PM — every single day. Serving NE Ohio since 2007." />
    <meta property="og:site_name" content="CNC Delivery Service" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="CNC Delivery | Pharmacy Delivery — Northeast Ohio" />
    <meta name="twitter:description" content="Reliable prescription delivery across 200+ ZIP codes. Dispatched before midnight, in patients' hands by 6 PM — every single day." />

    <!-- Geo -->
    <meta name="geo.region" content="US-OH" />
    <meta name="geo.placename" content="Akron, Ohio" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "CNC Delivery Service",
      "description": "Pharmacy and prescription delivery service covering 200+ ZIP codes across Northeast Ohio. Dispatched before midnight, delivered by 6 PM daily.",
      "url": "https://cncdelivery.com",
      "telephone": "+1-330-634-6260",
      "email": "dom@cncdeliveryservice.com",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Akron",
        "addressRegion": "OH",
        "addressCountry": "US"
      },
      "areaServed": {
        "@type": "GeoCircle",
        "geoMidpoint": {
          "@type": "GeoCoordinates",
          "latitude": 41.08,
          "longitude": -81.52
        },
        "geoRadius": "80000"
      },
      "foundingDate": "2007",
      "numberOfEmployees": {
        "@type": "QuantitativeValue",
        "minValue": 20
      },
      "serviceType": ["Pharmacy Delivery", "Prescription Delivery", "Cold Chain Delivery", "Medical Courier"],
      "openingHours": "Mo-Fr 08:00-18:00",
      "priceRange": "$$"
    }
    </script>

    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body>
    <div id="preloader" style="position:fixed;inset:0;z-index:9999;background:#1a3a7a;display:flex;align-items:center;justify-content:center;transition:opacity 0.4s ease,visibility 0.4s ease;">
      <div style="text-align:center;animation:preloaderIn 0.5s ease-out both;">
        <div style="display:flex;align-items:center;gap:12px;justify-content:center;">
          <span style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:28px;font-weight:300;letter-spacing:6px;color:rgba(255,255,255,0.9);">CNC</span>
          <span style="width:1px;height:32px;background:rgba(255,255,255,0.25);"></span>
          <div>
            <span style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:22px;font-weight:700;letter-spacing:4px;color:#fff;display:block;">DELIVERY</span>
          </div>
        </div>
        <div style="margin-top:16px;width:60px;height:2px;background:rgba(255,255,255,0.15);border-radius:2px;margin-left:auto;margin-right:auto;overflow:hidden;">
          <div style="width:100%;height:100%;background:#6495ED;animation:preloaderBar 1s ease-in-out infinite;transform-origin:left;"></div>
        </div>
      </div>
    </div>
    <style>
      @keyframes preloaderIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
      @keyframes preloaderBar { 0% { transform:scaleX(0); } 50% { transform:scaleX(1); } 100% { transform:scaleX(0); transform-origin:right; } }
    </style>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
